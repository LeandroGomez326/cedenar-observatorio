<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Alerta de Prueba</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto;">
    <div style="background: #8b5cf6; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0;">
        <h1 style="margin: 0;">🔔 Alerta de Prueba</h1>
    </div>
    
    <div style="background: #f9fafb; padding: 30px 20px; text-align: center; border-left: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb;">
        <div style="font-size: 64px; color: #10b981; margin-bottom: 20px;">✅</div>
        <h2 style="margin-bottom: 20px;">Sistema de alertas funcionando</h2>
        <p style="font-size: 16px; margin-bottom: 20px;">
            Esta es una alerta de prueba para verificar la configuración de email.
        </p>
        <p style="background: white; padding: 15px; border-radius: 5px; font-family: monospace;">
            <strong>Fecha:</strong> {{ fecha|date:"d/m/Y H:i" }}
        </p>
        <p style="margin-top: 30px;">
            <a href="https://cedenar-observatorio.onrender.com" 
               style="display: inline-block; background: #2563eb; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px;">
                Ir al Dashboard
            </a>
        </p>
    </div>
    
    <div style="background: #f3f4f6; padding: 15px; text-align: center; font-size: 12px; color: #6b7280; border-radius: 0 0 10px 10px; border: 1px solid #e5e7eb;">
        <p>Observatorio de Transición Energética CEDENAR</p>
        <p>Este es un mensaje automático, por favor no responder.</p>
    </div>
</body>
</html>
